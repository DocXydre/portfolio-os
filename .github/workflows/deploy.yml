name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Base href = /<repo>/ pour un dépôt projet, / pour une page utilisateur (user.github.io)
      - name: Compute base href
        id: basehref
        run: |
          REPO="${{ github.event.repository.name }}"
          if [[ "$REPO" == *.github.io ]]; then
            echo "href=/" >> "$GITHUB_OUTPUT"
          else
            echo "href=/$REPO/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        run: npm run build -- --base-href "${{ steps.basehref.outputs.href }}"

      # 404 -> index (SPA) et .nojekyll par sécurité
      - name: Prepare Pages artifact
        run: |
          DIST=dist/portfolio-windowsxp/browser
          cp "$DIST/index.html" "$DIST/404.html"
          touch "$DIST/.nojekyll"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/portfolio-windowsxp/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
